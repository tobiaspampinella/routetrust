services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: routetrust_local
      POSTGRES_USER: routetrust
      POSTGRES_PASSWORD: routetrust_local_password
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routetrust -d routetrust_local"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
