name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - staging

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://localhost:5432/logistics_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-placeholder-not-a-secret
      JWT_REFRESH_SECRET: ci-placeholder-not-a-secret
      ROUTEPULSE_DEMO_SECRET: ci-placeholder-not-a-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_MAP_PROVIDER: maplibre
      DEMO_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
